<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction API</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <div class="card glass-effect">
            <header class="card-header">
                <h1>Health Intelligence</h1>
                <p>Advanced Diabetes Risk Assessment</p>
            </header>
            
            <form id="prediction-form" class="prediction-form">
                <div class="form-grid">
                    <!-- Column 1 -->
                    <div class="input-group">
                        <label for="pregnancies">Pregnancies</label>
                        <input type="number" id="pregnancies" name="pregnancies" placeholder="e.g. 2" required min="0" step="1">
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-group">
                        <label for="glucose">Glucose Level</label>
                        <input type="number" id="glucose" name="glucose" placeholder="mg/dL" required min="0" step="any">
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-group">
                        <label for="bloodPressure">Blood Pressure</label>
                        <input type="number" id="bloodPressure" name="bloodPressure" placeholder="mm Hg" required min="0" step="any">
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-group">
                        <label for="skinThickness">Skin Thickness</label>
                        <input type="number" id="skinThickness" name="skinThickness" placeholder="mm" required min="0" step="any">
                        <span class="focus-border"></span>
                    </div>

                    <!-- Column 2 -->
                    <div class="input-group">
                        <label for="insulin">Insulin Level</label>
                        <input type="number" id="insulin" name="insulin" placeholder="mu U/ml" required min="0" step="any">
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-group">
                        <label for="bmi">BMI</label>
                        <input type="number" id="bmi" name="bmi" placeholder="Body Mass Index" required min="0" step="any">
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-group">
                        <label for="diabetesPedigreeFunction">Pedigree Function</label>
                        <input type="number" id="diabetesPedigreeFunction" name="diabetesPedigreeFunction" placeholder="e.g. 0.52" required min="0" step="any">
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" placeholder="Years" required min="0" step="1">
                        <span class="focus-border"></span>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary">
                    <span class="btn-text">Analyze Factors</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>

            <div id="result-container" class="result-container hidden">
                <div class="result-card">
                    <div id="result-icon" class="result-icon"></div>
                    <h2 id="result-title">Analysis Complete</h2>
                    <p id="result-probability" class="result-text"></p>
                    <button id="reset-btn" class="btn-secondary mt-4">New Assessment</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Link to external JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
